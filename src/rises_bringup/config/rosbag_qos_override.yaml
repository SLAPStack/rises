# QoS Override Configuration for rosbag2 playback
#
# PROBLEM: The bagfile was recorded with TRANSIENT_LOCAL durability on /mqtt/agv/tf,
# but standard ROS2 TF subscribers expect VOLATILE durability. rosbag2 player by default
# uses VOLATILE playback, which is correct, but this creates QoS compatibility warnings.
#
# SOLUTION: This file explicitly overrides the playback QoS to match ROS2 TF standards:
# - /tf should use VOLATILE (for dynamic transforms - live only)
# - /tf_static should use TRANSIENT_LOCAL (for static transforms - late joiners need history)
#
# USAGE:
#   ros2 bag play <bag_path> --qos-profile-overrides-path rosbag_qos_override.yaml

/mqtt/agv/tf:
  history: keep_last
  depth: 100
  reliability: reliable
  durability: volatile    # Override to VOLATILE to match standard ROS2 TF expectations
  deadline:
    sec: 2147483647
    nsec: 999999999
  lifespan:
    sec: 2147483647
    nsec: 999999999
  liveliness: automatic
  liveliness_lease_duration:
    sec: 2147483647
    nsec: 999999999

# Note: Other topics will use their recorded QoS or rosbag2 defaults
