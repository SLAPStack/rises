# ===============================================================================
# Geofence KPI run — geofence_current_bag
# ===============================================================================
# Bagfile : <your-workspace>/geofence_current_bag
# Duration: ~12.15 h (43742 s), 1.99M msgs, sqlite3, 1 AGV (agv_0)
#
# Warehouse geometry (extracted from the bag):
#   Outer hull : X 0.00 .. 128.72 m,  Y -33.79 .. 0.00 m   (~128 x 34 m)
#   Pallets    : 2166 obstacles, X 22.25 .. 128.36, Y -33.56 .. -0.14
#   Robot path : X 1.42 .. 128.93, Y -33.79 .. -0.65  (frame: map)
#
# Map delivery (TOPIC):  bag /mqtt/discerning_safety_map -> translator
#   -> /warehouse/map_updates -> geofence + fiware_bridge.
#   Contours: /mqtt/warehouse_contours -> translator -> /warehouse_contours.
#   NO obstacles_json pre-load: the map comes entirely from the bag, so the
#   geofence map matches this warehouse (not the rises_demo lab).
#
# Bag TF frames (namespaced):  map -> agv_0_base_link -> agv_0_laser_link.
#   base_link_frame is set to agv_0_base_link accordingly. Scan topic is
#   already /agv_0/scan_0, so no scan remap is needed.
#
# Visualization is OFF (no RViz, no geofence markers) — this is a headless
# KPI run.
#
# Usage (first run clears stale FIWARE data for a clean KPI window):
#   docker volume rm rises-fiware_timescale_data rises-fiware_mongodb_data
#   python3 -m orchestration.cli -c orchestration/configs/geofence_current_bag.yaml
#
# The bag is 12 h; for a KPI slice, let it play at 1x and Ctrl+C after the
# desired window — shutdown auto-exports logs/kpis_YYYYMMDD_HHMMSS.csv.
# ===============================================================================

mode: central

agv_namespaces:
  - agv_0

agv_scan_topic_remaps: {}

ros_domain_id: 0
startup_delay: 3.0
health_check_interval: 5.0
max_startup_retries: 3

# ===============================================================================
# Docker
# ===============================================================================
docker:
  network_mode: "host"
  restart_policy: "no"
  remove_on_exit: false
  log_driver: "json-file"
  log_max_size: "50m"
  log_max_file: 3

# ===============================================================================
# FIWARE Stack  (Orion-LD + TimescaleDB + Grafana)
# ===============================================================================
fiware:
  enabled: false
  fiware_namespaces:
    - agv_0
  compose_dir: "fiware"
  grafana_port: 3000
  timescale_port: 5432
  mintaka_port: 8080
  grafana_user: "admin"
  grafana_password: "admin"
  timescale_user: "postgres"
  timescale_password: "postgres"

# ===============================================================================
# Bridge Container  (rosbag replay + message translator)
# ===============================================================================
bridge:
  dockerfile: "central.dockerfile"

  enable_buffering: true
  buffer_timeout: 1.0
  replay_rate: 33.0
  target_frame: "map"
  base_link_pub_rate: 20.0
  use_sim_time: true

  # Headless KPI run — no RViz.
  launch_rviz: false
  rviz_namespace: "agv_0"
  rviz_config_file: ""

  play_rosbag: true
  bag_file: "<your-workspace>/geofence_current_bag"
  rosbag_rate: 1.0
  rosbag_loop: false          # play once → KPI export triggers on finish / Ctrl+C
  rosbag_delay: 3.0

  storage: "sqlite3"

  # Scan is already /agv_0/scan_0. Only the validation streams need remapping:
  #   /unity/obstacle_spawn -> validation node's spawn input
  #   /unity/obstacle_alert -> validation node's alarm input (alarm-vs-detection timing)
  rosbag_remaps: "/unity/obstacle_spawn:=/validation/obstacle_spawn,/unity/obstacle_alert:=/validation/obstacle_alarm"

  wait_for_geofence_ready: true
  geofence_ready_timeout: 60.0
  use_service_for_map_updates: false   # TOPIC delivery: translator → /warehouse/map_updates → geofence + FIWARE bridge

# ===============================================================================
# AGV Container (ARISE full stack — rises.dockerfile)
# ===============================================================================
agv:
  image: "rises:base"
  dockerfile: "rises.dockerfile"

  scenario: "rosbag"

  rises_mode: true
  launch_skill_bridge: false
  launch_mission_controller: false
  launch_heatmap: true
  launch_fiware_bridge: true
  launch_leg_filter: false

  # Geofence
  # Production run: safety circle ENABLED at 5 m. Eligibility gate also uses
  # GEOFENCE_SAFETY_RADIUS=5.0 so denominator = spawns robot came within 5 m of.
  enable_safety_circle: true
  safety_circle_radius: 5.0
  visualizer_enabled: false            # headless: no geofence markers
  use_namespace_for_map_frame: false
  target_frame: "map"
  base_link_frame: "agv_0_base_link"   # this bag's TF: map -> agv_0_base_link -> agv_0_laser_link

  # Robot filtering
  enable_robot_filtering: false
  robot_footprint_type: "circle"
  robot_footprint_radius: 0.5
  robot_footprint_margin: 0.1

  # Laserscan preprocessor
  dynamic_laser_detection: true
  segment_distance_threshold: 0.2
  segment_angle_threshold_deg: 30.0

  # TF: the bag's /tf carries map -> agv_0_base_link -> agv_0_laser_link.
  # No static TF publishing needed.
  publish_static_tf: false
  publish_lidar_static_tf: false
  lidar_transform_x: 0.0
  lidar_transform_y: 0.0
  lidar_transform_z: 0.0
  lidar_transform_roll: 0.0
  lidar_transform_pitch: 0.0
  lidar_transform_yaw: 0.0

  publish_unity_tf: false
  publish_slapstack_tf: false

  translator_enabled: false
  use_service_for_map_updates: false   # TOPIC: geofence subscribes to /warehouse/map_updates
  gridmap_enabled: false
  validation_enabled: true
  publish_report_always: true

  use_sim_time: true
  log_level: "info"

  # No JSON pre-load: the warehouse map comes entirely from the bag's MQTT
  # map updates, so the geofence map matches THIS warehouse (not the lab).
  obstacles_json_file: ""
  contours_json_file: ""
  publish_ready_signal: true

  json_suppress_topics: []

  env_vars:
    GEOFENCE_TF_PREFIX: ""
    FLEET_TF_PREFIX: ""
    GEOFENCE_SAFETY_RADIUS: "5.0"
    GEOFENCE_VALIDATION_DETECTION_WINDOW: "30.0"
    GEOFENCE_TRANSFORM_OBSTACLES_ENABLED: "false"
    GEOFENCE_TRANSFORM_BOUNDARIES_ENABLED: "false"
    # Heatmap grid sized to this warehouse (~128 x 34 m, centred ~(64, -17)).
    HEATMAP_GRID_CENTER_X: "64.0"
    HEATMAP_GRID_CENTER_Y: "-17.0"
    HEATMAP_GRID_WIDTH: "130.0"
    HEATMAP_GRID_HEIGHT: "36.0"
    HEATMAP_GAUSSIAN_SIGMA: "0.5"
    HEATMAP_PREDICTION_HORIZON: "8.0"
    HEATMAP_PREDICTION_STEP: "0.5"
